<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elite Estates | Real Estate</title>
    <style>
        :root { --gold: #c5a059; --black: #121212; --white: #ffffff; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        nav { background: var(--black); padding: 20px; display: flex; justify-content: center; }
        nav a { color: var(--white); margin: 0 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .section { display: none; padding: 50px; max-width: 800px; margin: 0 auto; background: white; }
        .active { display: block; }
        form { display: flex; flex-direction: column; }
        input, textarea { padding: 15px; margin: 10px 0; border: 1px solid #ccc; }
        .btn-trigger { background: var(--black); color: var(--gold); padding: 20px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>
<nav>
    <a onclick="navigate('home')">Home</a>
    <a onclick="navigate('contact')">Contacto</a>
</nav>
<section id="home" class="section active">
    <h1>Arquitectura de Activos</h1>
</section>
<section id="contact" class="section">
    <h2>Contacto</h2>
    <form id="contact-form" action="#" method="POST">
        <input type="text" name="name" id="name" placeholder="Tu nombre..." required>
        <input type="email" name="email" id="email" placeholder="tu@empresa.com" required>
        <textarea name="message" id="message" placeholder="Tu mensaje..."></textarea>
        <button type="submit" class="btn-trigger">Ejecutar Envío 10X</button>
    </form>
</section>
<script>
    function navigate(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
